on: GET /server-sent-events-example
do: $package_name$.ExampleServerEvents.subscribeToExampleEvents 'example-topic'
swagger:
  summary: Subscribe to example server-sent events
  description: This endpoint allows clients to receive real-time updates via Server-Sent Events (SSE).
  responses:
    '200':
      description: A stream of server-sent events
      content:
        text/event-stream:
          schema:
            type: string
            format: binary  # Represents the event stream
